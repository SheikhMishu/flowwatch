<svg xmlns="http://www.w3.org/2000/svg" width="200" height="48" viewBox="0 0 200 48" fill="none">
  <!-- Mark (48×48, paths scaled from 32×32 by ×1.5) -->
  <rect width="48" height="48" rx="11" fill="url(#logo-grad)"/>
  <!-- Connector lines -->
  <line x1="13.5" y1="24" x2="17.25" y2="24" stroke="white" stroke-width="3.3" opacity="0.75"/>
  <line x1="30.75" y1="24" x2="34.5" y2="24" stroke="white" stroke-width="3.3" opacity="0.75"/>
  <!-- Left node -->
  <circle cx="8.25" cy="24" r="5.25" fill="white"/>
  <!-- Center hub -->
  <circle cx="24" cy="24" r="7.2" fill="none" stroke="white" stroke-width="3.6"/>
  <circle cx="24" cy="24" r="3.15" fill="white"/>
  <!-- Right node -->
  <circle cx="39.75" cy="24" r="5.25" fill="white"/>

  <!-- Wordmark: "Flow" bold dark, "monix" gradient -->
  <text
    x="60"
    y="32"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#0C0E18"
  >Flow</text>
  <text
    x="105"
    y="32"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="-0.5"
    fill="url(#text-grad)"
  >monix</text>

  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B4FE8"/>
      <stop offset="1" stop-color="#7B5FED"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
</svg>
