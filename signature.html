<!doctype html>
<html>
  <body style="margin: 0; padding: 0; background: #ffffff">
    <table cellpadding="0" cellspacing="0" width="100%" style="padding: 32px">
      <tr>
        <td>
          <table
            cellpadding="0"
            cellspacing="0"
            style="
              font-family: Arial, sans-serif;
              background: #f1f5f9;
              border-radius: 10px;
              overflow: hidden;
              box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
              max-width: 480px;
            "
          >
            <!-- Indigo top bar -->
            <tr>
              <td
                style="
                  background: linear-gradient(90deg, #4f46e5 0%, #6366f1 100%);
                  height: 4px;
                  font-size: 0;
                "
              >
                &nbsp;
              </td>
            </tr>

            <!-- Main content -->
            <tr>
              <td style="padding: 24px 28px 20px 28px">
                <table cellpadding="0" cellspacing="0" width="100%">
                  <!-- Logo + name row -->
                  <tr>
                    <td style="vertical-align: middle; padding-bottom: 16px">
                      <table cellpadding="0" cellspacing="0">
                        <tr>
                          <td
                            style="vertical-align: middle; padding-right: 14px"
                          >
                            <img
                              src="https://lh3.googleusercontent.com/d/1hR6U1LrqveYc8t9IVmg98LjivWd_Jfxa"
                              width="36"
                              height="36"
                              alt="FlowMonix"
                              style="display: block; border-radius: 8px"
                            />
                          </td>
                          <td style="vertical-align: middle">
                            <div
                              style="
                                font-size: 16px;
                                font-weight: 700;
                                color: #111827;
                                letter-spacing: -0.3px;
                              "
                            >
                              FlowMonix
                            </div>
                            <div
                              style="
                                font-size: 12px;
                                color: #6b7280;
                                margin-top: 1px;
                              "
                            >
                              n8n Workflow Monitoring
                            </div>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <!-- Divider -->
                  <tr>
                    <td
                      style="
                        border-top: 1px solid #e5e7eb;
                        padding-bottom: 16px;
                        font-size: 0;
                      "
                    >
                      &nbsp;
                    </td>
                  </tr>

                  <!-- Sender name -->
                  <tr>
                    <td
                      style="
                        font-size: 14px;
                        font-weight: 600;
                        color: #111827;
                        padding-bottom: 2px;
                      "
                    >
                      Support Team
                    </td>
                  </tr>

                  <!-- Links row -->
                  <tr>
                    <td style="padding-top: 8px">
                      <table cellpadding="0" cellspacing="0">
                        <tr>
                          <td style="padding-right: 6px">
                            <a
                              href="https://flowmonix.com"
                              style="
                                display: inline-block;
                                font-size: 12px;
                                color: #ffffff;
                                background: #4f46e5;
                                text-decoration: none;
                                padding: 4px 12px;
                                border-radius: 20px;
                                font-weight: 500;
                              "
                              >flowmonix.com</a
                            >
                          </td>
                          <td>
                            <a
                              href="mailto:support@flowmonix.com"
                              style="
                                font-size: 12px;
                                color: #4f46e5;
                                text-decoration: none;
                              "
                              >support@flowmonix.com</a
                            >
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <!-- Tagline -->
                  <tr>
                    <td
                      style="
                        padding-top: 14px;
                        font-size: 12px;
                        color: #9ca3af;
                        border-top: 1px solid #f3f4f6;
                        margin-top: 14px;
                      "
                    >
                      <div
                        style="border-top: 1px solid #f3f4f6; padding-top: 12px"
                      >
                        Helping teams monitor and debug their n8n workflows.
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
